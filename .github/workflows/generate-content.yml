# 매일메일 기반 콘텐츠 자동 생성 워크플로우
# - 매일 KST 09:00 (UTC 00:00) 실행
# - 최신 미처리 질문 최대 3개 파싱 -> Claude로 포스트 생성 -> main 직접 푸시
#
# 필요한 GitHub Secrets:
#   ANTHROPIC_API_KEY   - Claude API 키 (포스트 생성)
#   VOYAGE_API_KEY      - Voyage AI API 키 (임베딩 생성)
#   SUPABASE_URL        - Supabase 프로젝트 URL
#   SUPABASE_ANON_KEY   - Supabase anon 키

name: Generate Content

on:
  schedule:
    - cron: '0 0 * * *' # UTC 00:00 = KST 09:00
  workflow_dispatch: # 수동 실행

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run generate-post -- --latest --count 3

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts/
          if git diff --cached --quiet; then
            echo "::notice::변경사항 없음 — 새 포스트가 생성되지 않았습니다."
          else
            git commit -m "content: 자동 생성 포스트"
            git push origin main
          fi
