# 매일메일 기반 콘텐츠 자동 생성 워크플로우
# - 매일 KST 09:00 (UTC 00:00) 실행
# - 최신 미처리 질문 최대 3개 파싱 -> Claude로 포스트 생성 -> PR 자동 생성
#
# 필요한 GitHub Secrets:
#   ANTHROPIC_API_KEY   - Claude API 키 (포스트 생성)
#   VOYAGE_API_KEY      - Voyage AI API 키 (임베딩 생성)
#   SUPABASE_URL        - Supabase 프로젝트 URL
#   SUPABASE_ANON_KEY   - Supabase anon 키

name: Generate Content

on:
  schedule:
    - cron: '0 0 * * *' # UTC 00:00 = KST 09:00
  workflow_dispatch: # 수동 실행

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest

    # 중복 PR 방지: 기존 auto-generate PR이 열려 있으면 스킵
    steps:
      - name: Check for existing auto-generate PR
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_PRS=$(gh pr list --repo ${{ github.repository }} --state open --label auto-generated --json number --jq 'length')
          if [ "$OPEN_PRS" -gt "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::기존 auto-generate PR이 열려 있어 스킵합니다."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        if: steps.check-pr.outputs.skip != 'true'
        run: npm ci

      - name: Generate posts
        if: steps.check-pr.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run generate-post -- --latest --count 3

      - name: Check for changes
        if: steps.check-pr.outputs.skip != 'true'
        id: changes
        run: |
          CHANGED_FILES=$(git diff --name-only)
          UNTRACKED_FILES=$(git ls-files --others --exclude-standard)
          ALL_FILES=$(echo -e "${CHANGED_FILES}\n${UNTRACKED_FILES}" | grep -v '^$' || true)
          if [ -z "$ALL_FILES" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            # PR 본문용 파일 목록 저장
            {
              echo "file_list<<EOF"
              echo "$ALL_FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: content/auto-generate-${{ github.run_id }}
          commit-message: 'content: 자동 생성 포스트'
          title: 'content: 자동 생성 포스트 (${{ github.run_id }})'
          body: |
            ## 자동 생성 포스트

            매일메일 기반 콘텐츠 자동 생성 워크플로우에 의해 생성된 PR입니다.

            ### 변경된 파일
            ```
            ${{ steps.changes.outputs.file_list }}
            ```

            > Generated by [generate-content.yml](.github/workflows/generate-content.yml)
          labels: auto-generated
          delete-branch: true
